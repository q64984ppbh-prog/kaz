<div class="modal-overlay" id="txModal"><div class="modal-sheet"><div class="modal-grabber"></div><div class="modal-heading">Транзакции</div><div id="txList"></div></div></div>
<div class="modal-overlay" id="setModal"><div class="modal-sheet"><div class="modal-grabber"></div><div class="modal-heading">Настройки</div><div class="settings-row"><span>Язык</span><select class="settings-select" id="langSel" onchange="chLang(this.value)"><option value="ru">Русский</option><option value="en">English</option></select></div><div class="settings-row"><span>Уведомления</span><div class="ios-switch on" id="notifToggle" onclick="tglNotif()"></div></div></div></div>
<div class="navbar"><button class="nav-item" id="navLeader" onclick="showPage('leader')"><svg viewBox="0 0 24 24"><path d="M8 21h8M12 17v4M7 3h10l2 6-7 4-7-4 2-6z"/></svg>Лидерборд</button><button class="nav-item active" id="navGame" onclick="showPage('game')"><svg viewBox="0 0 24 24"><path d="M12 2 2 7l10 5 10-5-10-5ZM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>Игры</button><button class="nav-item" id="navProfile" onclick="showPage('profile')"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Профиль</button></div>
<script>
const tg=window.Telegram?.WebApp||{expand(){},ready(){},showAlert:alert,initDataUnsafe:{}};tg.expand();tg.ready();
const u=tg.initDataUnsafe?.user||{};const uid=u.id||Math.floor(Math.random()*1e6);const ava=u.photo_url||'';
let bal=0,hasBet=false,curBet=0,gs='countdown',poll=null,cto=null,lastStatus=null;
const fly=document.getElementById('flyGif'),crush=document.getElementById('crushGif'),cv=document.getElementById('crashNum'),cdv=document.getElementById('cdNum'),go=document.getElementById('gameOverlay'),ab=document.getElementById('actionBtn'),pl=document.getElementById('playersPanel'),bm=document.getElementById('betModal'),dm=document.getElementById('depModal'),tm=document.getElementById('txModal'),sm=document.getElementById('setModal');
const tonB='<span class="ton-badge"><svg viewBox="0 0 56 56"><path d="M37.56 15.63H18.44c-3.52 0-5.74 3.79-3.98 6.86l11.8 20.45c.77 1.34 2.7 1.34 3.47 0l11.8-20.45c1.77-3.06-.46-6.86-3.97-6.86Zm-11.31 21.18l-8.77-16.07c-.4-.71.1-1.62.95-1.62h7.82v17.69Zm12.26-16.07l-8.77 16.07V19.12h7.82c.85 0 1.36.91.95 1.62Z" fill="#fff"/></svg></span>';
function resetOverlay(){fly.style.display='none';crush.style.display='none';cv.style.display='none';cdv.style.display='none';go.style.display='none'}
function ub(){document.getElementById('bal').textContent=bal.toFixed(2);document.getElementById('profBalBig').textContent=Math.round(bal).toString()}
async function init(){const r=await fetch('/api/init',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:uid,username:u.username||'',first_name:u.first_name||'',last_name:u.last_name||'',avatar_url:ava})});const d=await r.json();bal=d.balance;hasBet=d.has_bet;curBet=d.current_bet;const nm=((d.first_name||'')+' '+(d.last_name||'')).trim()||u.username||'UQCv8Hmrha';document.getElementById('profName').textContent=nm;if(ava){document.getElementById('profAvatarFallback').style.background=`url(${ava}) center/cover`}else document.getElementById('profAvatarFallback').textContent=(nm[0]||'K').toUpperCase();document.getElementById('langSel').value=d.lang||'ru';document.getElementById('notifToggle').className='ios-switch'+(d.notify?' on':'');ub();upd(d.game_state);sp()}
function upd(s){if(lastStatus!==s.status)resetOverlay();lastStatus=s.status;gs=s.status;if(s.status==='flying'){fly.style.display='block';if(hasBet){ab.className='bet-btn btn-cashout';ab.textContent='Забрать';ab.disabled=false;ab.onclick=co}else{ab.className='bet-btn btn-wait';ab.textContent='Ожидание';ab.disabled=true}}else if(s.status==='crashed'){crush.style.display='block';go.style.display='flex';ab.className='bet-btn btn-wait';ab.textContent='Ожидание';ab.disabled=true;hasBet=false;curBet=0;if(cto)clearTimeout(cto);cto=setTimeout(()=>{crush.style.display='none';go.style.display='none';cv.style.display='none'},2200)}else if(s.status==='countdown'){fly.style.display='block';go.style.display='flex';cdv.style.display='block';cdv.textContent=s.countdown;cv.style.display='none';if(hasBet){ab.className='bet-btn btn-wait';ab.textContent='Ожидание...';ab.disabled=true}else{ab.className='bet-btn btn-bet';ab.textContent='Сделать ставку';ab.disabled=false;ab.onclick=()=>bm.classList.add('active')}}if(s.status==='crashed'){go.style.display='flex';cv.style.display='block';cv.textContent='x'+Number(s.crash_point||1).toFixed(2)}ur(s.last_results||[],s);up(s.players||[])}
function ur(r,s){const demo=[1.09,2.44,1.00,1.74,3.83,3.89];const arr=r.length?r:demo;document.getElementById('resBar').innerHTML=(s.status==='flying'&&s.multiplier>1?`<span class="res-tag res-live">${s.multiplier.toFixed(2)}</span>`:'')+arr.slice(0,6).map((x,i)=>`<span class="res-tag ${i===0?'res-blue':x>=3?'res-gold':x>=2?'res-pink':'res-live'}">${i===0?'x':''}${Number(x).toFixed(2)}</span>`).join('')}
function up(pp){if(!pp.length)pp=[{name:'Mzfrvna)',avatar:'',bet:3.14,cashed_out:true,multiplier:1.09}];pl.innerHTML=pp.map(p=>`<div class="player-item">${p.avatar?`<img class="p-avatar" src="${p.avatar}">`:`<div class="p-avatar" style="background:linear-gradient(135deg,#f6c9e3,#6960a6)"></div>`}<div class="p-name"><div>${p.name}</div><div class="player-meta">${tonB}<span>${Number(p.bet||0).toFixed(2)}</span><span class="mult-badge">x${Number(p.multiplier||1.09).toFixed(2)}</span></div></div><div class="p-bet ${p.cashed_out?'p-cashed':'p-active'}">${tonB}<span>${(Number(p.bet||0)*Number(p.multiplier||1)).toFixed(2)}</span></div></div>`).join('')}
function setQuickBet(a){document.getElementById('betAmt').value=a}
async function submitBet(){const a=parseFloat(document.getElementById('betAmt').value);if(!a||a<=0){tg.showAlert('Введите сумму');return}if(a>bal){tg.showAlert('Недостаточно средств');return}const r=await fetch('/api/place_bet',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:uid,amount:a})});const d=await r.json();if(d.status==='ok'){bal=d.balance;hasBet=true;curBet=a;ub();ab.className='bet-btn btn-wait';ab.textContent='Ожидание...';ab.disabled=true;bm.classList.remove('active');document.getElementById('betAmt').value=''}else tg.showAlert(d.message||'Ошибка')}
async function co(){const r=await fetch('/api/cashout',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:uid})});const d=await r.json();if(d.status==='ok'){bal=d.balance;hasBet=false;curBet=0;ub();ab.className='bet-btn btn-wait';ab.textContent='Ожидание';ab.disabled=true;tg.showAlert(`+${d.winnings.toFixed(2)} TON`)}else{hasBet=false;curBet=0}}
async function createDep(){const a=parseFloat(document.getElementById('depAmt').value);if(!a||a<=0){tg.showAlert('Введите сумму');return}const r=await fetch('/api/create_deposit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:uid,amount:a})});const d=await r.json();if(d.status==='ok'){document.getElementById('depInfo').style.display='block';document.getElementById('depInfo').innerHTML=`<div class="deposit-card"><b>Отправьте ${d.amount_ton} TON</b><span class="deposit-addr">${d.admin_wallet}</span>Комментарий: <b style="color:#52ff75">${d.comment}</b></div>`}else tg.showAlert(d.message||'Ошибка')}
function showPage(p){document.querySelectorAll('.page').forEach(pg=>pg.classList.remove('active'));document.getElementById('page'+p.charAt(0).toUpperCase()+p.slice(1)).classList.add('active');document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));document.getElementById('nav'+p.charAt(0).toUpperCase()+p.slice(1)).classList.add('active');if(p==='profile')ub()}
function openDeposit(){dm.classList.add('active')}
async function showTxModal(){tm.classList.add('active');const r=await fetch('/api/transactions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:uid})});const d=await r.json();document.getElementById('txList').innerHTML=[...(d.transactions||[]).map(t=>`<div class="tx-row"><span>${t.type}</span><b>${t.amount.toFixed(2)}</b><small>${t.date}</small></div>`),...(d.deposits||[]).map(d=>`<div class="tx-row"><span>Депозит</span><b>${d.amount_game.toFixed(2)}</b><small>${d.date}</small></div>`)].join('')||'<div class="empty-row">Нет транзакций</div>'}
function showSettingsModal(){sm.classList.add('active')}async function chLang(v){await fetch('/api/set_lang',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:uid,lang:v})})}function tglNotif(){const t=document.getElementById('notifToggle');t.classList.toggle('on');fetch('/api/set_notify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:uid,notify:t.classList.contains('on')?1:0})})}
[dm,bm,tm,sm].forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('active')}));function sp(){if(poll)clearInterval(poll);poll=setInterval(async()=>{try{upd(await(await fetch('/api/game_state')).json())}catch(e){}},500)}init();
</script>
</body>
</html>
